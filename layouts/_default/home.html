{{ define "main" }}

{{ partial "breadcrumb.html" . }}

{{ if .Site.Params.showMainImage }}
<div class="main-image">
  <img
    src="{{ .Site.Params.mainImageUrl }}"
    alt="主页图片"
  />
</div>
{{ end }}

{{ partial "mood-calendar.html" . }}

<div class="home-content">
  {{ .Content }}
</div>

<div class="posts-list">
  {{ range first 10 .Site.RegularPages }}
  <div class="post-title">
    <a href="{{ .RelPermalink }}">- {{ .LinkTitle }}</a>
    <small>{{ .Date | time.Format "2006.01.02" }}</small>
  </div>
  {{ end }}
</div>

{{ end }}
